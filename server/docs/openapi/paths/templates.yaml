presets:
  get:
    tags:
      - Templates
    summary: List preset templates
    description: Retrieve a list of all global system preset templates.
    operationId: listPresetTemplates
    security:
      - BearerAuth: []
    responses:
      '200':
        description: List of preset templates retrieved.
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - message
                - data
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "List of preset templates retrieved."
                data:
                  type: array
                  items:
                    $ref: '../schemas/TemplatePreset.yaml'
      '401':
        description: Unauthorized.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '500':
        description: Server error.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

presetsById:
  get:
    tags:
      - Templates
    summary: Get preset template details
    description: Retrieve a specific system preset template by ID.
    operationId: getPresetTemplateById
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: ID of the preset template.
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Preset template details retrieved.
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - message
                - data
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Preset template details retrieved."
                data:
                  $ref: '../schemas/TemplatePreset.yaml'
      '401':
        description: Unauthorized.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Preset template not found.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '500':
        description: Server error.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

templates:
  get:
    tags:
      - Templates
    summary: List user templates
    description: Retrieve a list of templates created by the user or global presets.
    operationId: listUserTemplates
    security:
      - BearerAuth: []
    parameters:
      - name: categoryId
        in: query
        required: false
        description: Filter templates by category ID.
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: A list of templates.
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - message
                - data
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "List of templates retrieved."
                data:
                  type: array
                  items:
                    $ref: '../schemas/Template.yaml'
      '401':
        description: Unauthorized.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '500':
        description: Server error.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  post:
    tags:
      - Templates
    summary: Create a template
    description: Create a new custom journal template.
    operationId: createUserTemplate
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/CreateTemplateRequest.yaml'
    responses:
      '201':
        description: Custom template created.
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - message
                - data
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Custom template created."
                data:
                  $ref: '../schemas/Template.yaml'
      '400':
        description: Invalid request or validation error.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '401':
        description: Unauthorized.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '500':
        description: Server error.
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

