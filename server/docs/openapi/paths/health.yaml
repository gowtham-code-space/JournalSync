get:
  tags:
    - Health
  summary: System Health Check
  description: Verify that the API gateway is up and running.
  responses:
    '200':
      description: The API Gateway is healthy.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - message
              - data
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Health status retrieved successfully."
              data:
                $ref: '../schemas/HealthStatus.yaml'
