type: object
required:
  - success
  - message
  - data
properties:
  success:
    type: boolean
    description: Indicates whether the auth request was successful.
    example: true
  message:
    type: string
    description: Authentication status message.
    example: "Authenticated successfully."
  data:
    type: object
    required:
      - accessToken
      - refreshToken
      - user
    properties:
      accessToken:
        type: string
        description: JWT access token.
        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      refreshToken:
        type: string
        description: JWT refresh token.
        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      user:
        $ref: './User.yaml'
