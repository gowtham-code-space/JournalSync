type: object
required:
  - id
  - name
  - description
  - fields
  - isPreset
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
    description: Unique identifier of the template.
    example: "cf8b31a8-89f5-48fa-a4a1-77884dca9c90"
  name:
    type: string
    description: Name of the template.
    example: "Custom Daily Reflections"
  description:
    type: string
    description: Description of the template.
    example: "My customized reflection questions."
  fields:
    type: array
    description: Field definitions for the template.
    items:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          example: "What went well today?"
        type:
          type: string
          enum: [text, number, boolean, select]
          example: "text"
        required:
          type: boolean
          example: true
        options:
          type: array
          items:
            type: string
  categoryId:
    type: string
    format: uuid
    nullable: true
    description: Category ID associated with the template.
    example: "ea8b3504-20b1-4f0e-b7d1-ef49d012a64c"
  isPreset:
    type: boolean
    description: True if this is a global preset template, false if custom.
    example: false
  userId:
    type: string
    format: uuid
    nullable: true
    description: User ID who created the template (null for global presets).
    example: "d3b07384-d113-4956-a5cc-48144422e117"
  createdAt:
    type: string
    format: date-time
    description: Creation date-time.
    example: "2026-07-21T12:00:00Z"
  updatedAt:
    type: string
    format: date-time
    description: Last update date-time.
    example: "2026-07-21T12:00:00Z"
