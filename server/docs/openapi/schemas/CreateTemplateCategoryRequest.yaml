type: object
required:
  - name
  - color
  - description
properties:
  name:
    type: string
    description: Name of the template category.
    example: "Workplace Logs"
  color:
    type: string
    description: Hex color code.
    example: "#FFC107"
  description:
    type: string
    description: Description of the category.
    example: "Templates for tracking work activities and logs."
