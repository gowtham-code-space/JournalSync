type: object
required:
  - title
  - content
properties:
  title:
    type: string
    description: Title of the note.
    example: "Project Brainstorming"
  content:
    type: string
    description: Content of the note.
    example: "Here are some initial thoughts on architecture..."
  folderId:
    type: string
    format: uuid
    nullable: true
    description: ID of the folder to place the note in.
    example: "5a2d8e41-b839-44fc-a0f1-0814421111ee"
  categoryId:
    type: string
    format: uuid
    nullable: true
    description: ID of the category to assign.
    example: "ca8b3504-20b1-4f0e-b7d1-ef49d012a64c"
  tags:
    type: array
    items:
      type: string
    description: Tags to assign to the note.
    example: ["ideas", "draft"]
