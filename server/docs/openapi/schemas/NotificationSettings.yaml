type: object
required:
  - userId
  - emailNotifications
  - pushNotifications
  - dailyReminderEnabled
  - dailyReminderTime
  - weekendReminders
properties:
  userId:
    type: string
    format: uuid
    description: User ID these settings belong to.
    example: "d3b07384-d113-4956-a5cc-48144422e117"
  emailNotifications:
    type: boolean
    description: Toggle email notifications.
    example: true
  pushNotifications:
    type: boolean
    description: Toggle push notifications on active devices.
    example: true
  dailyReminderEnabled:
    type: boolean
    description: Toggle daily writing reminder alerts.
    example: true
  dailyReminderTime:
    type: string
    pattern: "^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$"
    description: Time of day (HH:MM in 24h format) to receive daily reminders.
    example: "20:00"
  weekendReminders:
    type: boolean
    description: Toggle reminders on Saturdays and Sundays.
    example: false
